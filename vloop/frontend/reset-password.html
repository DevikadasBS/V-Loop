<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | V-Loop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .bg-vloop-ink {
        background-color: #0b1314;
      }
      .bg-vloop-deep {
        background-color: #355245;
      }
      .bg-vloop-stone {
        background-color: #e3e5db;
      }
      .bg-vloop-ivory {
        background-color: #f4f1e8;
      }
      .border-vloop-mist {
        border-color: #afc1b6;
      }
      .text-vloop-deep {
        color: #355245;
      }
      .text-vloop-ink {
        color: #0b1314;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center px-4 py-10 bg-vloop-stone"
    style="
      background-image: linear-gradient(
        180deg,
        rgba(11, 19, 20, 0.08),
        rgba(11, 19, 20, 0.22)
      );
    "
  >
    <div
      class="w-full max-w-md bg-vloop-ivory p-10 rounded-[2rem] shadow-2xl border border-vloop-mist"
    >
      <h2 class="text-3xl font-bold mb-2 text-vloop-ink">Set New Password</h2>
      <p class="text-gray-500 mb-8">
        Choose a secure password to regain access.
      </p>

      <form id="reset-form" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1"
            >New Password</label
          >
          <input
            id="new-password"
            type="password"
            placeholder="********"
            autocomplete="new-password"
            class="border border-vloop-mist p-3 w-full rounded-xl bg-white focus:ring-2 focus:ring-[#AFC1B6] focus:outline-none transition"
          />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1"
            >Confirm Password</label
          >
          <input
            id="confirm-password"
            type="password"
            placeholder="********"
            autocomplete="new-password"
            class="border border-vloop-mist p-3 w-full rounded-xl bg-white focus:ring-2 focus:ring-[#AFC1B6] focus:outline-none transition"
          />
        </div>

        <button
          type="submit"
          class="bg-vloop-ink text-white w-full p-3 rounded-xl mt-8 font-bold hover:bg-vloop-deep transition shadow-lg relative"
        >
          Update Password
        </button>
      </form>

      <p class="mt-6 text-center text-sm">
        <a href="login.html" class="text-vloop-deep font-bold hover:underline"
          >Back to Login</a
        >
      </p>
    </div>

    <script>
      document
        .getElementById("reset-form")
        .addEventListener("submit", (event) => resetPassword(event));

      async function resetPassword(event) {
        event.preventDefault();
        const params = new URLSearchParams(window.location.search);
        const token = (params.get("token") || "").trim();
        const password = document.getElementById("new-password").value;
        const confirm = document.getElementById("confirm-password").value;

        if (password !== confirm) {
          alert("Passwords do not match");
          return;
        }

        if (!password) {
          alert("Enter a new password");
          return;
        }

        if (!token) {
          alert("Invalid reset token");
          return;
        }

        try {
          const res = await fetch("http://127.0.0.1:8000/api/reset-password/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, password }),
          });
          const data = await res.json().catch(() => ({}));
          alert(data.message || data.error || "Password reset failed");
          if (res.ok) window.location.href = "login.html";
        } catch (e) {
          alert(
            "Backend server is not running on http://127.0.0.1:8000. Start the Django server and try again.",
          );
        }
      }
    </script>
  </body>
</html>
